services:
  crawler_center:
    image: ghcr.io/wdx-123/crawler_center_scrapy:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: crawler_center_scrapy
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${CONFIG_PATH:-/opt/crawler_center_scrapy/config.yaml}:/app/config.yaml:ro
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
      REDIS_ADDRESS: ${REDIS_ADDRESS:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      OBS_ENABLED: ${OBS_ENABLED:-true}
      OBS_SERVICE_NAME: ${OBS_SERVICE_NAME:-crawler_center}
